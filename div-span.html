<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div e Span</title>

    <link rel="stylesheet" href="css/estilo.css">

</head>
<body>

    <div style="border-bottom: 3px solid; color: black;">
        <img src="img/logo-f1.png" width="100" alt="logo">
        <a href="">Recente</a>
        <a href="">Vídeo</a>
        <a href="">Agenda de corridas</a>
        <a href="">Pilotos</a>
        <span style="background-color: black;color: white;">
            Grupo Liberty Media
        </span>
    </div>

    
    <div style="background-color: lightgray;">
        <h1>Grande Pilotos da Fórmula 1</h1>
        <p>
            Alguns dos <span style="color: red;">melhores pilotos</span> da
            pilotos da fórmula 1, são vistos juntos
            na foto abaixo
        </p>
        <img src="/img/pilotos.jpeg" alt="pilotosf1">

    </div>

    <div style="color: white;background-color: black;">
        Site Oficial Fórmula 1
    </div>
    
</body>
</html>
